<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Vendas - Gás & Água</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .tab.active {
            background: white;
            border-bottom: 2px solid #007bff;
            color: #007bff;
        }

        .tab:hover {
            background: #e9ecef;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #007bff;
        }

        .btn {
            background: linear-gradient(45deg, #007bff, #0056b3);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(45deg, #28a745, #1e7e34);
        }

        .btn-danger {
            background: linear-gradient(45deg, #dc3545, #c82333);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            color: #007bff;
            margin-bottom: 10px;
        }

        .total {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
        }

        .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status.pago { background: #d4edda; color: #155724; }
        .status.pendente { background: #fff3cd; color: #856404; }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 Gás & Água</h1>
            <p>Sistema de Controle de Vendas</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="showTab('vendas')">📦 Nova Venda</div>
            <div class="tab" onclick="showTab('historico')">📋 Histórico</div>
            <div class="tab" onclick="showTab('relatorio')">📊 Relatórios</div>
        </div>

        <!-- ABA NOVA VENDA -->
        <div id="vendas" class="tab-content active">
            <div class="grid">
                <div class="card">
                    <h3>🔥 Produto</h3>
                    <div class="form-group">
                        <label>Produto:</label>
                        <select id="produto">
                            <option value="gas12kg">Gás 12kg - R$ 85,00</option>
                            <option value="gas45kg">Gás 45kg - R$ 220,00</option>
                            <option value="agua20l">Água 20L - R$ 8,50</option>
                            <option value="agua12l">Água 12L - R$ 6,00</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantidade:</label>
                        <input type="number" id="quantidade" value="1" min="1">
                    </div>
                </div>

                <div class="card">
                    <h3>👤 Cliente</h3>
                    <div class="form-group">
                        <label>Nome do Cliente:</label>
                        <input type="text" id="cliente" placeholder="Nome completo">
                    </div>
                    <div class="form-group">
                        <label>Endereço:</label>
                        <input type="text" id="endereco" placeholder="Rua, número, bairro">
                    </div>
                    <div class="form-group">
                        <label>Telefone:</label>
                        <input type="tel" id="telefone" placeholder="(11) 99999-9999">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Total: <span id="total">R$ 0,00</span></label>
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <button class="btn btn-success" onclick="registrarVenda()">
                    💾 Registrar Venda
                </button>
            </div>
        </div>

        <!-- ABA HISTÓRICO -->
        <div id="historico" class="tab-content">
            <div style="text-align: center; margin-bottom: 20px;">
                <input type="text" id="busca" placeholder="🔍 Buscar por cliente ou produto..." 
                       style="width: 300px; padding: 12px; border-radius: 25px; border: 2px solid #e9ecef;">
            </div>
            <table id="tabelaVendas">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Cliente</th>
                        <th>Produto</th>
                        <th>Qtd</th>
                        <th>Valor</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- ABA RELATÓRIOS -->
        <div id="relatorio" class="tab-content">
            <div class="grid">
                <div class="card">
                    <h3>📈 Hoje</h3>
                    <div id="totalHoje" class="total">R$ 0,00</div>
                    <p id="vendasHoje">0 vendas</p>
                </div>
                <div class="card">
                    <h3>📊 Este Mês</h3>
                    <div id="totalMes" class="total">R$ 0,00</div>
                    <p id="vendasMes">0 vendas</p>
                </div>
                <div class="card">
                    <h3>🎯 Total Geral</h3>
                    <div id="totalGeral" class="total">R$ 0,00</div>
                    <p id="vendasTotal">0 vendas</p>
                </div>
            </div>
            
            <div style="margin-top: 30px;">
                <h3>Produtos Mais Vendidos</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Quantidade</th>
                            <th>Valor Total</th>
                        </tr>
                    </thead>
                    <tbody id="topProdutos"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let vendas = JSON.parse(localStorage.getItem('vendas')) || [];
        let precos = {
            gas12kg: 85.00,
            gas45kg: 220.00,
            agua20l: 8.50,
            agua12l: 6.00
        };

        function showTab(tabName) {
            // Esconder todas as abas
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Mostrar aba selecionada
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'historico') atualizarTabela();
            if (tabName === 'relatorio') atualizarRelatorios();
        }

        function calcularTotal() {
            const produto = document.getElementById('produto').value;
            const quantidade = parseInt(document.getElementById('quantidade').value) || 0;
            const total = precos[produto] * quantidade;
            document.getElementById('total').textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        document.getElementById('produto').addEventListener('change', calcularTotal);
        document.getElementById('quantidade').addEventListener('input', calcularTotal);

        function registrarVenda() {
            const produto = document.getElementById('produto');
            const cliente = document.getElementById('cliente');
            const endereco = document.getElementById('endereco');
            const telefone = document.getElementById('telefone');
            const quantidade = document.getElementById('quantidade');

            if (!cliente.value.trim()) {
                alert('Por favor, informe o nome do cliente!');
                return;
            }

            const produtoInfo = produto.options[produto.selectedIndex].text;
            const valorUnitario = precos[produto.value];
            const quantidadeNum = parseInt(quantidade.value);
            const total = valorUnitario * quantidadeNum;

            const venda = {
                id: Date.now(),
                data: new Date().toLocaleString('pt-BR'),
                cliente: cliente.value,
                endereco: endereco.value,
                telefone: telefone.value,
                produto: produtoInfo,
                quantidade: quantidadeNum,
                valorUnitario: valorUnitario,
                total: total,
                status: 'pendente'
            };

            vendas.unshift(venda);
            localStorage.setItem('vendas', JSON.stringify(vendas));

            // Limpar formulário
            cliente.value = '';
            endereco.value = '';
            telefone.value = '';
            quantidade.value = 1;
            produto.selectedIndex = 0;
            calcularTotal();

            alert('✅ Venda registrada com sucesso!');
            atualizarTabela();
            atualizarRelatorios();
        }

        function atualizarTabela() {
            const tbody = document.querySelector('#tabelaVendas tbody');
            const busca = document.getElementById('busca').value.toLowerCase();
            
            tbody.innerHTML = '';

            const vendasFiltradas = vendas.filter(venda => 
                venda.cliente.toLowerCase().includes(busca) ||
                venda.produto.toLowerCase().includes(busca)
            );

            vendasFiltradas.forEach(venda => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${venda.data}</td>
                    <td>${venda.cliente}</td>
                    <td>${venda.produto}</td>
                    <td>${venda.quantidade}</td>
                    <td>R$ ${venda.total.toFixed(2).replace('.', ',')}</td>
                    <td><span class="status ${venda.status}">${venda.status === 'pago' ? '✅ Pago' : '⏳ Pendente'}</span></td>
                    <td>
                        <button class="btn" onclick="pagar(${venda.id})" style="padding: 6px 12px; font-size: 12px;">
                            ${venda.status === 'pago' ? '✅ Pago' : '💰 Pagar'}
                        </button>
                        <button class="btn btn-danger" onclick="excluir(${venda.id})" style="padding: 6px 12px; font-size: 12px; margin-left: 5px;">
                            🗑️
                        </button>
                    </td>
                `;
            });
        }

        function pagar(id) {
            const venda = vendas.find(v => v.id === id);
            if (venda) {
                venda.status = 'pago';
                localStorage.setItem('vendas', JSON.stringify(vendas));
                atualizarTabela();
                atualizarRelatorios();
                alert('✅ Venda marcada como paga!');
            }
        }

        function excluir(id) {
            if (confirm('Tem certeza que deseja excluir esta venda?')) {
                vendas = vendas.filter(v => v.id !== id);
                localStorage.setItem('vendas', JSON.stringify(vendas));
                atualizarTabela();
                atualizarRelatorios();
            }
        }

        function atualizarRelatorios() {
            const hoje = new Date().toDateString();
            const agora = new Date();

            // Filtrar por período
            const vendasHoje = vendas.filter(v => 
                new Date(v.data).toDateString() === hoje
            );
            const vendasMes = vendas.filter(v => {
                const dataVenda = new Date(v.data);
                return dataVenda.getMonth() === agora.getMonth() &&
                       dataVenda.getFullYear() === agora.getFullYear();
            });

            // Totais
            const totalHoje = vendasHoje.reduce((sum, v) => sum + v.total, 0);
            const totalMes = vendasMes.reduce((sum, v) => sum + v.total, 0);
            const totalGeral = vendas.reduce((sum, v) => sum + v.total, 0);

            document.getElementById('totalHoje').textContent = `R$ ${totalHoje.toFixed(2).replace('.', ',')}`;
            document.getElementById('totalMes').textContent = `R$ ${totalMes.toFixed(2).replace('.', ',')}`;
            document.getElementById('totalGeral').textContent = `R$ ${totalGeral.toFixed(2).replace('.', ',')}`;

            document.getElementById('vendasHoje').textContent = `${vendasHoje.length} vendas`;
            document.getElementById('vendasMes').textContent = `${vendasMes.length} vendas`;
            document.getElementById('vendasTotal').textContent = `${vendas.length} vendas`;

            // Top produtos
            const produtos = {};
            vendas.forEach(venda => {
                if (!produtos[venda.produto]) {
                    produtos[venda.produto] = { qtd: 0, total: 0 };
                }
                produtos[venda.produto].qtd += venda.quantidade;
                produtos[venda.produto].total += venda.total;
            });

            const topProdutos = Object.entries(produtos)
                .sort(([,a], [,b]) => b.total - a.total)
                .slice(0, 5);

            const tbody = document.getElementById('topProdutos');
            tbody.innerHTML = '';
            topProdutos.forEach(([produto, dados]) => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${produto}</td>
                    <td>${dados.qtd}</td>
                    <td>R$ ${dados.total.toFixed(2).replace('.', ',')}</td>
                `;
            });
        }

        // Busca em tempo real
        document.getElementById('busca').addEventListener('input', atualizarTabela);

        // Inicializar
        calcularTotal();
        atualizarTabela();
        atualizarRelatorios();
    </script>
</body>
</html>
